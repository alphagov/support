version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    allow:
      - dependency-type: direct
    cooldown:
      default-days: 3
    open-pull-requests-limit: 25
    groups:
      test:
        patterns:
        - "factory_bot*"
        - "govuk_test"
        - "rails-controller-testing"
        - "rspec-*"
        - "shoulda"
        - "simplecov"
        - "timecop"
        - "webmock"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    allow:
      - dependency-type: direct
    cooldown:
      default-days: 3
    open-pull-requests-limit: 25
    groups:
      lint:
        patterns:
          - "standardx"
          - "stylelint"
          - "stylelint-*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 25
